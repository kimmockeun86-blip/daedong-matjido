name: Daily Android APK Builder

on:
  schedule:
    # Runs at 00:00 UTC (09:00 KST) every day
    - cron: '0 0 * * *'
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build Android APK
        run: |
          cd android
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Send APK to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Error: Telegram credentials (TELEGRAM_BOT_TOKEN and/or TELEGRAM_CHAT_ID) are not configured as secrets in this repository."
            exit 1
          fi
          
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "Sending APK to Telegram..."
            curl -v \
              -F chat_id="$TELEGRAM_CHAT_ID" \
              -F document=@"$APK_PATH" \
              -F caption="📦 대동맛지도 최신 APK 빌드본이 도착했습니다! (빌드 시각: $(date '+%Y-%m-%d %H:%M:%S'))" \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
          else
            echo "Error: APK file not found at $APK_PATH"
            exit 1
          fi
